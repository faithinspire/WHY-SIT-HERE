<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Sit Here and Die? - Online Reader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Lora', serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        
        .login-box h1 {
            color: #D4AF37;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .login-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.05em;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #D4AF37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            background: #A0860D;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212,175,55,0.4);
        }
        
        .error-message {
            color: #d32f2f;
            margin-top: 15px;
            display: none;
        }
        
        .reader-container {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        
        .reader-header {
            background: linear-gradient(135deg, #D4AF37 0%, #A0860D 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .reader-header h1 {
            font-size: 1.8em;
            margin: 0;
        }
        
        .reader-controls {
            display: flex;
            gap: 15px;
        }
        
        .btn-control {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-control:hover {
            background: white;
            color: #D4AF37;
        }
        
        .reader-content {
            padding: 50px;
            line-height: 1.9;
            font-size: 1.05em;
            color: #444;
        }
        
        .reader-content h2 {
            color: #D4AF37;
            margin-top: 40px;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 10px;
        }
        
        .reader-content h3 {
            color: #A0860D;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .reader-content p {
            margin-bottom: 15px;
            text-align: justify;
        }
        
        .reader-content strong {
            color: #D4AF37;
        }
        
        .chapter-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
        }
        
        .chapter-nav button {
            padding: 10px 20px;
            background: #D4AF37;
            color: #1a1a1a;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .chapter-nav button:hover {
            background: #A0860D;
        }
        
        .chapter-nav button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .chapter-info {
            text-align: center;
            color: #666;
        }
        
        @media (max-width: 768px) {
            .reader-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .reader-controls {
                width: 100%;
                flex-wrap: wrap;
            }
            
            .reader-content {
                padding: 20px;
            }
            
            .chapter-nav {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
            
            .chapter-nav button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h1>Why Sit Here and Die?</h1>
            <p>Enter your password to access the book</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login">Access Book</button>
            </form>
            <div class="error-message" id="errorMessage">Incorrect password. Please try again.</div>
        </div>
    </div>
    
    <!-- Reader Screen -->
    <div class="reader-container" id="readerScreen">
        <div class="reader-header">
            <h1>Why Sit Here and Die?</h1>
            <div class="reader-controls">
                <button class="btn-control" onclick="downloadPDF()">📥 Download PDF</button>
                <button class="btn-control" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
        
        <div class="reader-content" id="bookContent">
            <!-- Book content will be loaded here -->
        </div>
        
        <div class="chapter-nav">
            <button onclick="previousChapter()" id="prevBtn">← Previous Chapter</button>
            <div class="chapter-info">
                <span id="chapterInfo">Chapter 1 of 18</span>
            </div>
            <button onclick="nextChapter()" id="nextBtn">Next Chapter →</button>
        </div>
    </div>
    
    <script src="chapters-part1.js"></script>
    <script src="chapters-part2.js"></script>
    <script src="chapters-part3.js"></script>
    <script>
        const CORRECT_PASSWORD = "March31";
        let currentChapter = 1;
        const totalChapters = 18;
        
        // Check if user is already logged in
        window.addEventListener('load', function() {
            if (localStorage.getItem('bookAccess') === 'true') {
                showReader();
                loadChapter(currentChapter);
            }
            
            // Check for URL parameter (post-payment redirect)
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('access')) {
                localStorage.setItem('bookAccess', 'true');
                window.history.replaceState({}, document.title, window.location.pathname);
                showReader();
                loadChapter(currentChapter);
            }
        });
        
        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === CORRECT_PASSWORD) {
                localStorage.setItem('bookAccess', 'true');
                document.getElementById('password').value = '';
                showReader();
                loadChapter(currentChapter);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
        
        function showReader() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('readerScreen').style.display = 'block';
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('bookAccess');
                document.getElementById('readerScreen').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('password').value = '';
                currentChapter = 1;
            }
        }
        
        function loadChapter(chapterNum) {
            currentChapter = chapterNum;
            const bookContent = getBookContent(chapterNum);
            document.getElementById('bookContent').innerHTML = bookContent;
            document.getElementById('chapterInfo').textContent = `Chapter ${chapterNum} of ${totalChapters}`;
            
            // Update button states
            document.getElementById('prevBtn').disabled = chapterNum === 1;
            document.getElementById('nextBtn').disabled = chapterNum === totalChapters;
            
            // Scroll to top
            document.getElementById('bookContent').scrollIntoView({ behavior: 'smooth' });
        }
        
        function nextChapter() {
            if (currentChapter < totalChapters) {
                loadChapter(currentChapter + 1);
            }
        }
        
        function previousChapter() {
            if (currentChapter > 1) {
                loadChapter(currentChapter - 1);
            }
        }
        
        function downloadPDF() {
            alert('PDF download feature coming soon. You can use your browser\'s print function (Ctrl+P or Cmd+P) to save as PDF.');
        }
        
        function getBookContent(chapterNum) {
            // Merge all chapter parts
            const allChapters = { ...bookChapters, ...bookChaptersPart2, ...bookChaptersPart3 };
            return allChapters[chapterNum] || '<p>Chapter content loading...</p>';
        }
    </script>
</body>
</html>
