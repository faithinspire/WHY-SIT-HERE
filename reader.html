        let currentPage = 0;
        let isLoggedIn = false;
        const correctPassword = "MOVE2026"; // Change this to your desired password

        function handleLogin(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === correctPassword) {
                isLoggedIn = true;
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('readerScreen').style.display = 'block';
                displayPage(0);
                generateTOC();
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        function displayPage(pageNum) {
            if (pageNum < 0 || pageNum >= bookContent.length) return;
            
            currentPage = pageNum;
            const page = bookContent[pageNum];
            document.getElementById('bookContent').innerHTML = page.content;
            document.getElementById('currentPage').textContent = pageNum + 1;
            document.getElementById('totalPages').textContent = bookContent.length;
            
            document.getElementById('prevBtn').disabled = pageNum === 0;
            document.getElementById('nextBtn').disabled = pageNum === bookContent.length - 1;
            
            window.scrollTo(0, 0);
        }

        function nextPage() {
            if (currentPage < bookContent.length - 1) {
                displayPage(currentPage + 1);
            }
        }

        function previousPage() {
            if (currentPage > 0) {
                displayPage(currentPage - 1);
            }
        }

        function generateTOC() {
            const tocList = document.getElementById('tocList');
            tocList.innerHTML = '';
            bookContent.forEach((page, index) => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = page.title;
                a.onclick = (e) => {
                    e.preventDefault();
                    displayPage(index);
                    toggleTOC();
                };
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        function toggleTOC() {
            const toc = document.getElementById('tocContainer');
            toc.style.display = toc.style.display === 'none' ? 'block' : 'none';
        }

        function toggleTheme() {
            document.body.style.background = document.body.style.background === 'rgb(26, 26, 26)' 
                ? 'linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%)' 
                : 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%)';
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('readerScreen').style.display = 'none';
            document.getElementById('password').value = '';
            currentPage = 0;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!isLoggedIn) return;
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') previousPage();
        });
