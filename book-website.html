<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Sit Here and Die? - Breaking the Trap of Stagnation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Lato', sans-serif; color: #f5f0e8; background: #0a0a0a; overflow-x: hidden; }
        
        /* HERO CANVAS */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
        
        /* NAV */
        nav { position: sticky; top: 0; z-index: 1000; background: rgba(10,10,10,0.95); padding: 1.5rem 2rem; border-bottom: 2px solid #c9a84c; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #c9a84c; font-weight: 900; }
        nav ul { display: flex; list-style: none; gap: 2rem; }
        nav a { color: #f5f0e8; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
        nav a:hover { color: #c9a84c; }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 0.4rem; }
        .hamburger span { width: 25px; height: 3px; background: #c9a84c; }
        
        @media (max-width: 768px) {
            nav ul { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>
    <!-- NAV -->
    <nav>
        <div class="logo">WSHED</div>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#chapters">Chapters</a></li>
            <li><a href="#author">Author</a></li>
            <li><a href="#testimonials">Testimonials</a></li>
            <li><a href="#getbook">Get the Book</a></li>
            <li><a href="#access">Access Book</a></li>
        </ul>
        <div class="hamburger">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <!-- HERO -->
    <section id="hero" style="position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; z-index: 2;">
        <canvas id="particleCanvas"></canvas>
        <div style="position: relative; z-index: 3; max-width: 800px; padding: 2rem;">
            <h1 style="font-family: 'Playfair Display', serif; font-size: 4rem; color: #c9a84c; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(201,168,76,0.3);">WHY SIT HERE AND DIE?</h1>
            <p style="font-size: 1.3rem; color: #f5f0e8; margin-bottom: 2rem; font-style: italic;">Breaking the trap of stagnation — spiritually, financially, and personally</p>
            <div style="background: rgba(201,168,76,0.1); border-left: 4px solid #c9a84c; padding: 1.5rem; margin: 2rem 0; font-style: italic;">
                "Why sit we here until we die?" — 2 Kings 7:3 (KJV)
            </div>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem;">
                <button onclick="document.getElementById('chapters').scrollIntoView()" style="padding: 1rem 2rem; background: transparent; border: 2px solid #c9a84c; color: #c9a84c; font-size: 1rem; cursor: pointer; transition: all 0.3s;">Read a Chapter</button>
                <button onclick="document.getElementById('getbook').scrollIntoView()" style="padding: 1rem 2rem; background: #c9a84c; color: #0a0a0a; font-size: 1rem; cursor: pointer; transition: all 0.3s; font-weight: bold;">Get the Book</button>
            </div>
            <div style="margin-top: 3rem; animation: bounce 2s infinite;">
                <i class="fas fa-chevron-down" style="font-size: 2rem; color: #c9a84c;"></i>
            </div>
        </div>
    </section>

    <!-- PLACEHOLDER FOR REMAINING SECTIONS -->
    <div style="padding: 4rem 2rem; text-align: center; color: #999;">
        <p>Additional sections loading...</p>
    </div>

    <script>
        // PARTICLE CANVAS
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                radius: Math.random() * 2
            });
        }
        
        function animateParticles() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#c9a84c';
            
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
